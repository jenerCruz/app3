<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Ventas y Metas | App Local PWA</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="manifest" href="/manifest.webmanifest" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5', // Indigo-600
                        secondary: '#10B981', // Emerald-500
                        accent: '#F59E0B', // Amber-500
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        };
    </script>

    <script type="module">
        import {
            createIcons,
            Home,
            Target,
            TrendingUp,
            Users,
            Settings,
            Plus,
            Save,
            Trash2,
            Edit,
            Check,
            X,
        } from 'https://unpkg.com/lucide@latest';
        window.icons = { Home, Target, TrendingUp, Users, Settings, Plus, Save, Trash2, Edit, Check, X };
        window.createIcons = createIcons;
    </script>

    <style>
        body {
            background-color: #f3f4f6;
        }
        .container-app {
            max-width: 100vw;
            min-height: 100vh;
            padding-bottom: 72px;
        }
        #nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background-color: white;
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 4px;
            cursor: pointer;
            transition: color 0.2s, background-color 0.2s;
        }
        .nav-item.active {
            color: #4F46E5;
        }
        .modal {
            transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out;
        }
        .modal-content {
            transform: translateY(20px);
            transition: transform 0.3s ease-in-out;
        }
        .modal.open .modal-content {
            transform: translateY(0);
        }
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="font-sans">
    <div id="app" class="container-app mx-auto p-4 md:p-6">
        <header class="mb-6">
            <h1 class="text-3xl font-bold text-gray-800 text-center md:text-left">Gestión de Ventas Local</h1>
            <p class="text-gray-600 text-center md:text-left">Seguimiento de Metas y Productividad</p>
        </header>

        <main id="content" class="bg-white p-4 rounded-xl shadow-lg"></main>

        <div id="message-modal" class="modal fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center p-4 opacity-0 invisible" onclick="app.closeModal()">
            <div class="modal-content bg-white p-6 rounded-lg shadow-2xl w-full max-w-sm" onclick="event.stopPropagation()">
                <h3 id="message-title" class="text-xl font-semibold text-gray-800 mb-3"></h3>
                <p id="message-body" class="text-gray-600 mb-6"></p>
                <div class="flex justify-end">
                    <button onclick="app.closeModal()" class="px-4 py-2 bg-primary text-white font-medium rounded-lg hover:bg-indigo-700 transition duration-150">Aceptar</button>
                </div>
            </div>
        </div>

        <div id="loading-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50 opacity-0 invisible transition duration-300">
            <div class="flex flex-col items-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
                <p class="mt-4 text-white text-lg">Sincronizando...</p>
            </div>
        </div>
    </div>

    <nav id="nav-bar" class="flex justify-around">
        <div class="nav-item active" data-view="dashboard" onclick="app.renderView('dashboard')">
            <i data-lucide="home" class="w-5 h-5"></i>
            <span class="text-xs mt-1">Tablero</span>
        </div>
        <div class="nav-item" data-view="goals" onclick="app.renderView('goals')">
            <i data-lucide="target" class="w-5 h-5"></i>
            <span class="text-xs mt-1">Metas</span>
        </div>
        <div class="nav-item" data-view="sales" onclick="app.renderView('sales')">
            <i data-lucide="trending-up" class="w-5 h-5"></i>
            <span class="text-xs mt-1">Ventas</span>
        </div>
        <div class="nav-item" data-view="productivity" onclick="app.renderView('productivity')">
            <i data-lucide="users" class="w-5 h-5"></i>
            <span class="text-xs mt-1">Productividad</span>
        </div>
        <div class="nav-item" data-view="settings" onclick="app.renderView('settings')">
            <i data-lucide="settings" class="w-5 h-5"></i>
            <span class="text-xs mt-1">Config</span>
        </div>
    </nav>

    <script type="module">
        // ===================================================================
        // 1. DEFINICIÓN DE LA CLASE SalesApp
        // ===================================================================
        class SalesApp {
            constructor() {
                this.state = {
                    isReady: false,
                    currentView: 'dashboard',
                    goals: [],
                    sales: [],
                    config: {}, // Aquí se guarda la configuración del Gist
                    gistId: 'TU_ID_DE_GIST_AQUÍ', // ⚠️ REEMPLAZA
                    gistToken: 'TU_TOKEN_DE_GITHUB_AQUÍ', // ⚠️ REEMPLAZA
                };
                this.contentContainer = document.getElementById('content');
                this.navItems = document.querySelectorAll('.nav-item');
                this.messageModal = document.getElementById('message-modal');
                this.loadingOverlay = document.getElementById('loading-overlay');
                this.db = null; // Para IndexedDB
            }

            // ===================================================================
            // 2. UTILIDADES DE UI
            // ===================================================================
            showMessage(title, body) {
                document.getElementById('message-title').textContent = title;
                document.getElementById('message-body').textContent = body;
                this.messageModal.classList.add('open');
                this.messageModal.classList.remove('invisible', 'opacity-0');
                this.messageModal.classList.add('opacity-100', 'visible');
            }

            closeModal() {
                this.messageModal.classList.remove('open', 'opacity-100', 'visible');
                this.messageModal.classList.add('invisible', 'opacity-0');
            }

            showLoading(message = 'Sincronizando...') {
                document.querySelector('#loading-overlay p').textContent = message;
                this.loadingOverlay.classList.remove('invisible', 'opacity-0');
                this.loadingOverlay.classList.add('opacity-100', 'visible');
            }

            hideLoading() {
                this.loadingOverlay.classList.remove('opacity-100', 'visible');
                this.loadingOverlay.classList.add('invisible', 'opacity-0');
            }

            // ===================================================================
            // 3. BASE DE DATOS LOCAL (IndexedDB - Simple Placeholder)
            // ===================================================================
            async initDB() {
                // ⚠️ AÑADE AQUÍ LA LÓGICA DE INDEXEDDB REAL
                // Este es un placeholder que siempre tiene éxito para iniciar la app.
                return new Promise(resolve => {
                    setTimeout(() => {
                        console.log("DB: Inicialización simulada exitosa.");
                        resolve(true); 
                    }, 500); 
                });
            }

            // ===================================================================
            // 4. LÓGICA DE GIST (Sincronización)
            // ===================================================================
            async fetchGistData() {
                if (!this.state.gistId) {
                    throw new Error("Gist ID no configurado.");
                }
                const url = `https://api.github.com/gists/${this.state.gistId}`;
                const response = await fetch(url, {
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        // Opcional: Para Gists privados o aumentar el límite de tasa
                        // 'Authorization': `token ${this.state.gistToken}`,
                    }
                });
                if (!response.ok) {
                    throw new Error(`Fallo al cargar Gist: ${response.statusText}`);
                }
                const gist = await response.json();
                const file = gist.files['app_config.json'] || gist.files[Object.keys(gist.files)[0]];
                if (!file || !file.content) {
                    throw new Error("No se encontró el archivo de configuración en el Gist.");
                }
                return JSON.parse(file.content);
            }

            async loadGistConfig() {
                this.showLoading("Cargando configuración...");
                try {
                    const data = await this.fetchGistData();
                    this.state.config = data.config || {};
                    this.state.goals = data.goals || [];
                    this.state.sales = data.sales || [];
                    console.log("Gist cargado con éxito.");
                } catch (e) {
                    console.error("Error Gist:", e);
                    // Usar datos locales si falla la carga del Gist
                    this.showMessage("Advertencia de Sincronización", "No se pudo cargar la configuración de GitHub Gist. Usando datos locales.");
                    // En un entorno real, cargarías los datos guardados en IndexedDB aquí.
                } finally {
                    this.hideLoading();
                }
            }

            // ===================================================================
            // 5. RENDERIZADO DE VISTAS (Lógica simplificada)
            // ===================================================================
            renderView(viewName) {
                // Actualiza la barra de navegación
                this.navItems.forEach(item => {
                    if (item.dataset.view === viewName) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });

                this.contentContainer.innerHTML = '';
                let htmlContent = '';
                
                switch (viewName) {
                    case 'dashboard':
                        htmlContent = this.renderDashboard();
                        break;
                    case 'goals':
                        htmlContent = '<h2>Gestión de Metas</h2><p>Página de Metas.</p>';
                        break;
                    case 'sales':
                        htmlContent = '<h2>Registro de Ventas</h2><p>Página de Ventas.</p>';
                        break;
                    case 'productivity':
                        htmlContent = '<h2>Análisis de Productividad</h2><p>Página de Productividad.</p>';
                        break;
                    case 'settings':
                        htmlContent = '<h2>Configuración</h2><p>Página de Configuración (Gist ID, Token).</p>';
                        break;
                }
                
                this.contentContainer.innerHTML = htmlContent;
                window.createIcons({ icons: window.icons });
            }

            renderDashboard() {
                // Ejemplo básico usando datos cargados (this.state.goals, this.state.sales)
                let totalProgress = 0;
                // ... lógica real de renderizado del dashboard (omitida por brevedad)
                return `
                    <h2 class="text-2xl font-bold mb-4">Resumen Mensual</h2>
                    <p class="text-gray-600">Total de ${this.state.goals.length} metas cargadas (vía Gist).</p>
                    <div class="mt-6">
                        <p class="text-sm text-gray-500">Renderizar detalles de Gist/Ventas...</p>
                    </div>
                `;
            }

            // ===================================================================
            // 6. INICIALIZACIÓN
            // ===================================================================
            async init() {
                try {
                    // 1. Inicializa la base de datos local
                    await this.initDB(); 
                    // 2. Carga la configuración (Gist)
                    await this.loadGistConfig();
                    
                    this.state.isReady = true;
                    this.renderView('dashboard');
                } catch (e) {
                    // Esto se mostrará si initDB() o loadGistConfig() falla.
                    this.showMessage("Fallo en Inicialización", "La aplicación no pudo cargar. Verifique la consola para detalles del error.");
                    console.error("Initialization failed:", e);
                }
            }
        }

        // ===================================================================
        // 7. ARRANQUE DE LA APLICACIÓN
        // ===================================================================
        const app = new SalesApp();
        window.app = app; // Hace la instancia accesible globalmente para onclick
        app.init();
    </script>
</body>
</html>
